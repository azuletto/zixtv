<svg width="100%" height="60" viewBox="0 0 400 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b0000;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect x="0" y="10" width="400" height="8" rx="4" fill="#1a1a1a" />

  <rect x="0" y="10" width="240" height="8" rx="4" fill="url(#grad)" filter="url(#glow)">
    <animate attributeName="width" from="0" to="240" dur="1.5s" fill="freeze" calcMode="spline" keySplines="0.42 0 0.58 1" />
    
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite" />
  </rect>

  <text x="200" y="45" fill="#ff0000" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" filter="url(#glow)">
    60%
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" />
  </text>
</svg>
